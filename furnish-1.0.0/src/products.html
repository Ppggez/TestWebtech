<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furnish - Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    .card-img-top {
      height: 250px;
      object-fit: cover;
    }
    .card {
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold text-uppercase" href="#">Furnish</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Testimonials</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="py-5 bg-light text-center">
  <div class="container">
    <h1 class="display-4 fw-bold">Products</h1>
    <p><a href="#" class="text-decoration-none">Home</a> / Products</p>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row">

      <aside class="col-lg-3 mb-5">
        <div class="card p-4 shadow-sm border-0">
          <h5>Search</h5>
          <input type="text" class="form-control mb-4" placeholder="Search products">

          <h5>Categories</h5>
          <ul class="list-unstyled">
            <li><a href="#" class="text-decoration-none text-dark">Chair</a></li>
            <li><a href="#" class="text-decoration-none text-dark">Sofa</a></li>
            <li><a href="#" class="text-decoration-none text-dark">Lamp</a></li>
            <li><a href="#" class="text-decoration-none text-dark">Table</a></li>
          </ul>

          <h5 class="mt-4">Filter Price</h5>
          <input type="range" class="form-range">
        </div>
      </aside>

      <div class="col-lg-9">
        <div class="row g-4" id="product-container">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading products...</p>
            </div>
        </div>

        <nav class="mt-5">
          <ul class="pagination justify-content-center border-0">
            <li class="page-item active"><a class="page-link border-0" href="#">1</a></li>
            <li class="page-item"><a class="page-link border-0 text-dark" href="#">2</a></li>
            <li class="page-item"><a class="page-link border-0 text-dark" href="#">3</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</section>

<footer class="bg-dark text-white py-5">
  <div class="container text-center">
    <h4 class="fw-bold">Furnish</h4>
    <p>Email: info@example.com</p>
    <p class="text-secondary small">© 2026 Furnish. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadProducts() {
    const container = document.getElementById('product-container');
    // แก้ไข Path ให้ดึงจากโฟลเดอร์ public โดยตรง (สำหรับ Vite)
    const dataSource = 'data/products.json'; 

    try {
        const response = await fetch(dataSource);

        if (!response.ok) {
            throw new Error(`ไม่สามารถดึงข้อมูลได้ (Status: ${response.status})`);
        }

        const products = await response.json();
        container.innerHTML = '';

        if (products.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5">ไม่พบสินค้าในขณะนี้</div>';
            return;
        }

        products.forEach(product => {
            const productCard = `
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm h-100">
                        <img src="${product.image_url}" class="card-img-top" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x250?text=No+Image'">
                        <div class="card-body text-center d-flex flex-column">
                            <h5 class="fw-bold">${product.name}</h5>
                            <p class="mt-auto">
                                ${product.original_price ? `<del class="text-muted small">$${product.original_price}</del>` : ''}
                                <strong class="text-dark">$${product.price}</strong>
                            </p>
                            <button class="btn btn-dark w-100 mt-2" onclick="addToCart(${product.id})">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', productCard);
        });

    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                <p class="text-danger mt-3 fw-bold">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
                <p class="small text-muted">กรุณาตรวจสอบว่าไฟล์ public/products.json ถูกต้องและรันด้วยคำสั่ง npm run dev</p>
            </div>
        `;
    }
}

function addToCart(id) {
    console.log("เพิ่มสินค้าลงตะกร้า ID:", id);
    alert("เพิ่มสินค้าลงในตะกร้าเรียบร้อยแล้ว!");
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
